name: Retag Docker Image

on:
    workflow_call:
        inputs:
            registry:
                description: "The Docker registry"
                required: true
                type: string
            image-name:
                description: "The name of the Docker image"
                required: true
                type: string
            source-tag:
                description: "The source tag to retag from"
                required: true
                type: string
            target-tags:
                description: "Newline-separated list of target tags to apply"
                required: true
                type: string
        secrets:
            token:
                description: "GitHub token for authentication"
                required: true

jobs:
    retag:
        runs-on: ubuntu-latest
        steps:
            - name: Log in to the Container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ inputs.registry }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.token }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Retag image
              run: |
                  # Construct the list of --tag arguments from the newline-separated input
                  TAG_ARGS=""
                  while IFS= read -r tag; do
                    if [ -n "$tag" ]; then
                      TAG_ARGS="$TAG_ARGS --tag ${{ inputs.registry }}/${{ inputs.image-name }}:${tag}"
                    fi
                  done <<< "${{ inputs.target-tags }}"

                  # Run the command once with all tags specified
                  docker buildx imagetools create \
                    $TAG_ARGS \
                    "${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.source-tag }}"
