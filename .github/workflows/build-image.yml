name: Build Docker Image

on:
    workflow_call:
        inputs:
            registry:
                description: "The Docker registry to push to"
                required: true
                type: string
            image-name:
                description: "The name of the Docker image"
                required: true
                type: string
            image-tags:
                description: "Newline-separated list of tags to apply (e.g. latest, pr-42)"
                required: true
                type: string
            dockerfile-context:
                description: "The context path for the Dockerfile"
                required: true
                type: string
            dockerfile:
                description: "The path to the Dockerfile. If not provided, defaults to '{dockerfile-context}/Dockerfile'"
                required: false
                type: string
        secrets:
            token:
                description: "GitHub token for authentication"
                required: true

jobs:
    build-image:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Log in to the Container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ inputs.registry }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.token }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build full image tags
              id: full-tags
              run: |
                  {
                    echo "tags<<EOF"
                    while IFS= read -r tag; do
                      [ -n "$tag" ] && printf '%s/%s:%s\n' "${{ inputs.registry }}" "${{ inputs.image-name }}" "$tag"
                    done <<< "${{ inputs.image-tags }}"
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ${{ inputs.dockerfile-context }}
                  file: ${{ inputs.dockerfile || format('{0}/Dockerfile', inputs.dockerfile-context) }}
                  push: true
                  tags: ${{ steps.full-tags.outputs.tags }}
                  cache-from: type=registry,ref=${{ inputs.registry }}/${{ inputs.image-name }}:buildcache
                  cache-to: type=registry,ref=${{ inputs.registry }}/${{ inputs.image-name }}:buildcache,mode=max
